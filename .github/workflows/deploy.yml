name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      database:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: app
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Lint container
        run: php bin/console lint:container --no-interaction
        env:
          DATABASE_URL: mysql://root:secret@127.0.0.1:3306/app?serverVersion=8.0.32&charset=utf8mb4
          APP_ENV: test

      - name: Run tests
        run: php bin/phpunit
        env:
          DATABASE_URL: mysql://root:secret@127.0.0.1:3306/app?serverVersion=8.0.32&charset=utf8mb4
          APP_ENV: test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/php/Dockerfile
          push: true
          tags: ahmed48e/e-commerce-php:latest

      - name: Build and push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/nginx/Dockerfile
          push: true
          tags: ahmed48e/e-commerce-nginx:latest
